server {
    listen 80;
    server_name lubanaiagent.com www.lubanaiagent.com;

    root /var/www/luban-ai-agent/current;
    index index.html;

    access_log /var/log/nginx/luban-ai-agent.access.log;
    error_log /var/log/nginx/luban-ai-agent.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
